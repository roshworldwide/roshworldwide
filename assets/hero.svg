<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 660" width="1600" height="660" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Helvetica, Arial, sans-serif" role="img" aria-label="Roshan Raj — Systems Engineer, AI-Infrastructure Architect, Inventor with 7 patents pending. Most engineers just write code. I build systems that dominate.">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.6" y2="1">
      <stop offset="0" stop-color="#0B0B0D"/><stop offset="0.55" stop-color="#0F0F12"/><stop offset="1" stop-color="#0A0A0C"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F0DDA9"/><stop offset="0.5" stop-color="#C9A876"/><stop offset="1" stop-color="#9E7E52"/>
    </linearGradient>
    <linearGradient id="goldH" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#E8D4A2"/><stop offset="1" stop-color="#B7935F"/>
    </linearGradient>
    <linearGradient id="name" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FBFAF7"/><stop offset="1" stop-color="#D9D6CE"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#C9A876" stop-opacity="0.5"/><stop offset="0.55" stop-color="#C9A876" stop-opacity="0.08"/><stop offset="1" stop-color="#C9A876" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="7"/></filter>
    <filter id="grain"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/><feColorMatrix type="saturate" values="0"/></filter>
    <linearGradient id="shim" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#F0DDA9" stop-opacity="0"/><stop offset="0.5" stop-color="#F0DDA9" stop-opacity="0.10"/><stop offset="1" stop-color="#F0DDA9" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="frame"><rect x="1" y="1" width="1598" height="658" rx="3"/></clipPath>
  </defs>

  <rect width="1600" height="660" fill="url(#bg)"/>
  <!-- breathing gold aura behind the mark -->
  <ellipse cx="800" cy="215" rx="520" ry="360" fill="url(#glow)">
    <animate attributeName="opacity" values="0.7;1;0.7" dur="7s" repeatCount="indefinite"/>
  </ellipse>
  <rect width="1600" height="660" filter="url(#grain)" opacity="0.045"/>

  <!-- editorial corner brackets -->
  <g stroke="url(#goldH)" stroke-width="1.6" fill="none" opacity="0.6">
    <path d="M44 84 L44 44 L84 44"/><path d="M1556 84 L1556 44 L1516 44"/>
    <path d="M44 576 L44 616 L84 616"/><path d="M1556 576 L1556 616 L1516 616"/>
  </g>

  <!-- top micro labels -->
  <text x="64" y="70" font-family="ui-monospace,'SF Mono',Menlo,monospace" font-size="13" letter-spacing="3" fill="#C9A876">// ENGINEERED BY ROSH</text>
  <text x="1536" y="70" text-anchor="end" font-family="ui-monospace,'SF Mono',Menlo,monospace" font-size="13" letter-spacing="3" fill="#837F77">BENGALURU · UTC +05:30</text>

  <!-- mark: 6-point star -->
  <g transform="translate(800,182)">
    <path transform="scale(1.5)" d="M0,-40 L8,-13.86 L34.64,-20 L16,0 L34.64,20 L8,13.86 L0,40 L-8,13.86 L-34.64,20 L-16,0 L-34.64,-20 L-8,-13.86 Z" fill="url(#gold)" filter="url(#soft)" opacity="0.9"/>
    <path transform="scale(1.5)" d="M0,-40 L8,-13.86 L34.64,-20 L16,0 L34.64,20 L8,13.86 L0,40 L-8,13.86 L-34.64,20 L-16,0 L-34.64,-20 L-8,-13.86 Z" fill="url(#gold)"/>
  </g>

  <!-- name -->
  <text x="800" y="368" text-anchor="middle" font-size="104" font-weight="800" letter-spacing="-3" fill="url(#name)">Roshan Raj</text>
  <!-- gold rule -->
  <rect x="724" y="398" width="152" height="2.5" rx="1.25" fill="url(#goldH)"/>

  <!-- tagline -->
  <text x="800" y="452" text-anchor="middle" font-size="29" font-weight="500" letter-spacing="-0.2" fill="#B7B3AA">Most engineers just write code. I build systems that <tspan font-weight="700" fill="url(#goldH)">dominate.</tspan></text>

  <!-- bottom credential strip -->
  <g>
    <line x1="430" y1="556" x2="600" y2="556" stroke="#3A382F" stroke-width="1"/>
    <line x1="1000" y1="556" x2="1170" y2="556" stroke="#3A382F" stroke-width="1"/>
    <text x="800" y="561" text-anchor="middle" font-family="ui-monospace,'SF Mono',Menlo,monospace" font-size="13" letter-spacing="2.6" fill="#8A8780">SYSTEMS ENGINEER · AI-INFRASTRUCTURE ARCHITECT · INVENTOR — 7 PATENTS PENDING</text>
  </g>

  <!-- slow shimmer sweep -->
  <g clip-path="url(#frame)"><g transform="skewX(-16)">
    <rect x="-500" y="-60" width="150" height="820" fill="url(#shim)">
      <animate attributeName="x" values="-500;-500;1900;1900" keyTimes="0;0.2;0.62;1" dur="9s" begin="1s" repeatCount="indefinite"/>
    </rect>
  </g></g>

  <rect x="0.75" y="0.75" width="1598.5" height="658.5" rx="3" fill="none" stroke="#1C1B18" stroke-width="1.5"/>
</svg>
