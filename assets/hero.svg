<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 520" width="1600" height="520" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Inter Tight', system-ui, sans-serif">
  <defs>
    <linearGradient id="shine" gradientUnits="userSpaceOnUse" x1="-100" y1="-100" x2="100" y2="100">
      <stop offset="0" stop-color="#EBD6A8"/>
      <stop offset="0.5" stop-color="#C9A876"/>
      <stop offset="1" stop-color="#8A6D40"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="520" fill="#0E0E10"/>
  <rect x="0" y="1" width="1600" height="1" fill="#F5F5F2" fill-opacity="0.06"/>

  <!-- Decastar (shine) — static, stillness before movement -->
  <g transform="translate(800 150) scale(0.53)" fill="url(#shine)">
    <polygon points="0,-100 14,-51 0,-8 -14,-51"/>
    <polygon points="95.11,-30.9 52.83,-2.45 7.61,-2.47 44.18,-29.07"/>
    <polygon points="58.78,80.9 18.65,49.49 4.7,6.47 41.3,33.03"/>
    <polygon points="-58.78,80.9 -41.3,33.03 -4.7,6.47 -18.65,49.49"/>
    <polygon points="-95.11,-30.9 -44.18,-29.07 -7.61,-2.47 -52.83,-2.45"/>
    <polygon points="38.21,-52.59 25.87,-22 5.29,-7.28 12.92,-31.4"/>
    <polygon points="61.82,20.09 28.91,17.81 8.56,2.78 33.86,2.59"/>
    <polygon points="0,65 -8,33 0,9 8,33"/>
    <polygon points="-61.82,20.09 -33.86,2.59 -8.56,2.78 -28.91,17.81"/>
    <polygon points="-38.21,-52.59 -12.92,-31.4 -5.29,-7.28 -25.87,-22"/>
  </g>

  <!-- wordmark -->
  <text x="800" y="300" text-anchor="middle" font-size="64" font-weight="600" letter-spacing="-2.5" fill="#F5F5F2">roshworldwide</text>

  <!-- gold hairline -->
  <rect x="640" y="340" width="320" height="1" fill="#C9A876" fill-opacity="0.18"/>

  <!-- manifesto — the page's single Signal-Red word -->
  <text x="800" y="388" text-anchor="middle" font-size="22" font-weight="400" letter-spacing="1" fill="#C7C5C0">Build dark. Build fast. Build <tspan fill="#B22222">inevitable.</tspan></text>

  <!-- bottom strip -->
  <text x="48" y="488" font-family="'SF Mono', ui-monospace, 'JetBrains Mono', Menlo, monospace" font-size="12" letter-spacing="2" fill="#888780">BLR · 12.97°N 77.59°E · UTC+05:30</text>
  <text x="1552" y="488" text-anchor="end" font-family="'SF Mono', ui-monospace, 'JetBrains Mono', Menlo, monospace" font-size="12" letter-spacing="2" fill="#888780">SYS // SHIPPING</text>

  <rect x="0" y="519" width="1600" height="1" fill="#F5F5F2" fill-opacity="0.06"/>
