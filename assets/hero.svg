<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" width="1200" height="320" font-family="ui-monospace, 'JetBrains Mono', 'SF Mono', Menlo, Consolas, monospace">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#05060a"/>
      <stop offset="0.5" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#161226"/>
    </linearGradient>
    <linearGradient id="nameGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.5" stop-color="#ffb3bb"/>
      <stop offset="1" stop-color="#ff4757"/>
    </linearGradient>
    <linearGradient id="underGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ff4757"/>
      <stop offset="1" stop-color="#58a6ff"/>
    </linearGradient>
    <radialGradient id="redGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ff4757" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#ff4757" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0 H0 V40" fill="none" stroke="#1f2630" stroke-width="0.6"/>
    </pattern>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- background -->
  <rect x="0" y="0" width="1200" height="320" fill="url(#bgGrad)"/>
  <rect x="0" y="0" width="1200" height="320" fill="url(#grid)" opacity="0.55"/>
  <ellipse cx="600" cy="90" rx="520" ry="190" fill="url(#redGlow)"/>

  <!-- scanline -->
  <rect x="0" y="0" width="1200" height="2" fill="#ff4757" opacity="0.25">
    <animate attributeName="y" values="0;318;0" dur="9s" repeatCount="indefinite"/>
  </rect>

  <!-- HUD corner brackets -->
  <g fill="none" stroke="#58a6ff" stroke-width="2" opacity="0.8">
    <path d="M44 16 H16 V44"/>
    <path d="M1156 16 H1184 V44"/>
    <path d="M44 304 H16 V276"/>
    <path d="M1156 304 H1184 V276"/>
  </g>

  <!-- status row -->
  <text x="44" y="32" font-size="13" fill="#7d8590" letter-spacing="1">BENGALURU · 12.97°N 77.59°E</text>
  <text x="1156" y="32" font-size="13" fill="#7d8590" letter-spacing="1" text-anchor="end">SYS.STATUS: <tspan fill="#2ea043">● SHIPPING</tspan></text>

  <!-- name -->
  <text x="600" y="152" font-size="76" font-weight="800" letter-spacing="10" text-anchor="middle" fill="url(#nameGrad)" filter="url(#glow)">ROSHAN RAJ</text>

  <!-- underline -->
  <rect x="330" y="178" width="540" height="3" rx="1.5" fill="url(#underGrad)">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="3s" repeatCount="indefinite"/>
  </rect>

  <!-- tagline -->
  <text x="600" y="214" font-size="19" letter-spacing="3" text-anchor="middle" fill="#c9d1d9">INVENT · SHIP · PATENT · REPEAT</text>

  <!-- stat chips -->
  <g font-size="14" font-weight="700">
    <!-- red chip -->
    <g>
      <rect x="285" y="262" width="210" height="34" rx="17" fill="#0d1117" stroke="#ff4757" stroke-width="1.4"/>
      <circle cx="307" cy="279" r="4" fill="#ff4757">
        <animate attributeName="opacity" values="1;0.2;1" dur="1.6s" begin="0s" repeatCount="indefinite"/>
      </circle>
      <text x="323" y="284" fill="#ff8e9e">20 PATENT FILINGS</text>
    </g>
    <!-- blue chip -->
    <g>
      <rect x="513" y="262" width="165" height="34" rx="17" fill="#0d1117" stroke="#58a6ff" stroke-width="1.4"/>
      <circle cx="535" cy="279" r="4" fill="#58a6ff">
        <animate attributeName="opacity" values="1;0.2;1" dur="1.6s" begin="0.4s" repeatCount="indefinite"/>
      </circle>
      <text x="551" y="284" fill="#9ecbff">99.9% UPTIME</text>
    </g>
    <!-- green chip -->
    <g>
      <rect x="696" y="262" width="220" height="34" rx="17" fill="#0d1117" stroke="#2ea043" stroke-width="1.4"/>
      <circle cx="718" cy="279" r="4" fill="#2ea043">
        <animate attributeName="opacity" values="1;0.2;1" dur="1.6s" begin="0.8s" repeatCount="indefinite"/>
      </circle>
      <text x="734" y="284" fill="#7ee2a8">AIR-GAPPED 14B LLM</text>
    </g>
  </g>
</svg>
