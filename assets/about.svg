<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1112" width="1600" height="1112" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Inter Tight', system-ui, sans-serif">
  <defs>
    <filter id="blur55" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="55"/></filter>
    <filter id="blur70" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="70"/></filter>
    <radialGradient id="lfGold"><stop offset="0" stop-color="#C9A876" stop-opacity="0.12"/><stop offset="1" stop-color="#C9A876" stop-opacity="0"/></radialGradient>
    <radialGradient id="lfMid"><stop offset="0" stop-color="#1A2332" stop-opacity="0.18"/><stop offset="1" stop-color="#1A2332" stop-opacity="0"/></radialGradient>
    <radialGradient id="auGold"><stop offset="0" stop-color="#C9A876" stop-opacity="0.08"/><stop offset="1" stop-color="#C9A876" stop-opacity="0"/></radialGradient>
    <radialGradient id="auMid"><stop offset="0" stop-color="#1A2332" stop-opacity="0.14"/><stop offset="1" stop-color="#1A2332" stop-opacity="0"/></radialGradient>
    <radialGradient id="sonar"><stop offset="0" stop-color="#C9A876" stop-opacity="0"/><stop offset="0.7" stop-color="#C9A876" stop-opacity="0"/><stop offset="1" stop-color="#C9A876" stop-opacity="0.4"/></radialGradient>
    <linearGradient id="specBand" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#ffffff" stop-opacity="0"/><stop offset="0.5" stop-color="#ffffff" stop-opacity="0.07"/><stop offset="1" stop-color="#ffffff" stop-opacity="0"/></linearGradient>
    <linearGradient id="shimmer" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#ffffff" stop-opacity="0"/><stop offset="0.5" stop-color="#ffffff" stop-opacity="0.06"/><stop offset="1" stop-color="#ffffff" stop-opacity="0"/></linearGradient>
    <linearGradient id="edgeGrad" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#ffffff" stop-opacity="0"/><stop offset="0.5" stop-color="#ffffff" stop-opacity="0.22"/><stop offset="1" stop-color="#ffffff" stop-opacity="0"/></linearGradient>
    <linearGradient id="topGlow" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#ffffff" stop-opacity="0.06"/><stop offset="1" stop-color="#ffffff" stop-opacity="0"/></linearGradient>
    <linearGradient id="shine" gradientUnits="userSpaceOnUse" x1="-100" y1="-100" x2="100" y2="100"><stop offset="0" stop-color="#EBD6A8"/><stop offset="0.5" stop-color="#C9A876"/><stop offset="1" stop-color="#8A6D40"/></linearGradient>
    <linearGradient id="goldNum" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#EBD6A8"/><stop offset="1" stop-color="#B8965F"/></linearGradient>
    <linearGradient id="glintBand" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#EBD6A8" stop-opacity="0"/><stop offset="0.5" stop-color="#EBD6A8" stop-opacity="0.6"/><stop offset="1" stop-color="#EBD6A8" stop-opacity="0"/></linearGradient>
    <clipPath id="abclip"><rect x="80" y="20" width="1440" height="1072" rx="36"/></clipPath>
  </defs>
  <rect width="1600" height="1112" fill="#0E0E10"/>
  <g filter="url(#blur55)">
    <ellipse cx="420" cy="260" rx="460" ry="320" fill="url(#lfGold)"><animateTransform attributeName="transform" type="translate" calcMode="spline" dur="22s" repeatCount="indefinite" keyTimes="0;0.5;1" values="0,0;40,18;0,0" keySplines="0.5 0 0.1 1;0.5 0 0.1 1"/></ellipse>
    <ellipse cx="1200" cy="460" rx="460" ry="320" fill="url(#lfMid)"><animateTransform attributeName="transform" type="translate" calcMode="spline" dur="24s" repeatCount="indefinite" keyTimes="0;0.5;1" values="0,0;-40,-14;0,0" keySplines="0.5 0 0.1 1;0.5 0 0.1 1"/></ellipse>
  </g>
  <g fill="#F5F5F2">
    <circle cx="110" cy="90" r="1" opacity="0.05"><animate attributeName="opacity" calcMode="spline" dur="9s" repeatCount="indefinite" keyTimes="0;0.5;1" values="0.05;0.075;0.05" keySplines="0.5 0 0.1 1;0.5 0 0.1 1"/></circle>
    <circle cx="110" cy="1022" r="1" opacity="0.045"><animate attributeName="opacity" calcMode="spline" dur="11s" repeatCount="indefinite" keyTimes="0;0.5;1" values="0.045;0.07;0.045" keySplines="0.5 0 0.1 1;0.5 0 0.1 1"/><animateTransform attributeName="transform" type="translate" additive="sum" calcMode="spline" dur="12s" repeatCount="indefinite" keyTimes="0;0.5;1" values="0,0;8,0;0,0" keySplines="0.5 0 0.1 1;0.5 0 0.1 1"/></circle>
    <circle cx="1490" cy="90" r="1" opacity="0.05"><animate attributeName="opacity" calcMode="spline" dur="10s" repeatCount="indefinite" keyTimes="0;0.5;1" values="0.05;0.075;0.05" keySplines="0.5 0 0.1 1;0.5 0 0.1 1"/></circle>
    <circle cx="1490" cy="1022" r="1" opacity="0.04"><animate attributeName="opacity" calcMode="spline" dur="8s" repeatCount="indefinite" keyTimes="0;0.5;1" values="0.04;0.065;0.04" keySplines="0.5 0 0.1 1;0.5 0 0.1 1"/></circle>
  </g>
  <rect x="80" y="20" width="1440" height="1072" rx="36" fill="#1F1F22" fill-opacity="0.52" stroke="#F5F5F2" stroke-opacity="0.14" stroke-width="1"/>
  <g clip-path="url(#abclip)">
    <rect x="80" y="20" width="1440" height="12" fill="url(#topGlow)"/>
    <g transform="rotate(20 800.0 556.0)"><rect x="-260" y="-623" width="280" height="2358" fill="url(#specBand)"><animateTransform attributeName="transform" type="translate" calcMode="spline" dur="16s" begin="0s" repeatCount="indefinite" keyTimes="0;0.4;1" values="0,0;1840,0;1840,0" keySplines="0.5 0 0.1 1;0.5 0 0.1 1"/></rect></g>
  </g>
  <rect x="116" y="20.5" width="1368" height="1.5" fill="url(#edgeGrad)"/>
  <text x="130" y="160" font-size="38" font-weight="600" letter-spacing="-1" fill="#F5F5F2">Builds systems that ship</text>
  <text x="130" y="208" font-size="38" font-weight="600" letter-spacing="-1" fill="#F5F5F2">dark and stay sealed.</text>
  <text x="130" y="250" font-size="19" font-weight="400" fill="#C7C5C0">Twenty patent applications were published in 2026 with one</text>
  <text x="130" y="280" font-size="19" font-weight="400" fill="#C7C5C0">inventor named on all of them. They began as an ordinary</text>
  <text x="130" y="310" font-size="19" font-weight="400" fill="#C7C5C0">irritation: proxy attendance at a university in Bengaluru.</text>
  <text x="130" y="340" font-size="19" font-weight="400" fill="#C7C5C0">GPS check-ins could be faked from a hostel room. Bluetooth</text>
  <text x="130" y="370" font-size="19" font-weight="400" fill="#C7C5C0">could be relayed. Sound inside a classroom could not. That</text>
  <text x="130" y="400" font-size="19" font-weight="400" fill="#C7C5C0">observation became an acoustic-handshake protocol, then a</text>
  <text x="130" y="430" font-size="19" font-weight="400" fill="#C7C5C0">production system an entire campus runs on, then a patent</text>
  <text x="130" y="460" font-size="19" font-weight="400" fill="#C7C5C0">family filed by the university itself — now scaling from</text>
  <text x="130" y="490" font-size="19" font-weight="400" fill="#C7C5C0">one campus to five.</text>
  <text x="130" y="544" font-size="19" font-weight="400" fill="#C7C5C0">The same instinct runs through everything here: systems</text>
  <text x="130" y="574" font-size="19" font-weight="400" fill="#C7C5C0">should work where the internet cannot reach them. A</text>
  <text x="130" y="604" font-size="19" font-weight="400" fill="#C7C5C0">14-billion-parameter model, quantized to 4-bit, diagnoses</text>
  <text x="130" y="634" font-size="19" font-weight="400" fill="#C7C5C0">failing servers and writes its own remediation with zero</text>
  <text x="130" y="664" font-size="19" font-weight="400" fill="#C7C5C0">bytes leaving the machine. A trading pipeline earns its</text>
  <text x="130" y="694" font-size="19" font-weight="400" fill="#C7C5C0">54.7% the honest way — 4.45 million rows, walked forward</text>
  <text x="130" y="724" font-size="19" font-weight="400" fill="#C7C5C0">across 160 days, no curve-fitting. A native macOS engine</text>
  <text x="130" y="754" font-size="19" font-weight="400" fill="#C7C5C0">forecasts liquidity ninety days out at a locked 120 frames</text>
  <text x="130" y="784" font-size="19" font-weight="400" fill="#C7C5C0">per second. Different domains, one doctrine: ship to</text>
  <text x="130" y="814" font-size="19" font-weight="400" fill="#C7C5C0">production, measure everything, send nothing home.</text>
  <text x="130" y="868" font-size="19" font-weight="400" fill="#C7C5C0">Currently a computer science undergraduate at Manipal,</text>
  <text x="130" y="898" font-size="19" font-weight="400" fill="#C7C5C0">Bengaluru, Class of '27 — with a co-founded infrastructure</text>
  <text x="130" y="928" font-size="19" font-weight="400" fill="#C7C5C0">company, a FinTech LLM internship that cut</text>
  <text x="130" y="958" font-size="19" font-weight="400" fill="#C7C5C0">query-resolution time by 90%, and a standing rule: find a</text>
  <text x="130" y="988" font-size="19" font-weight="400" fill="#C7C5C0">real problem, invent the fix, file the claim, repeat. The</text>
  <text x="130" y="1018" font-size="19" font-weight="400" fill="#C7C5C0">interesting problems are the ones nobody assigned.</text>
  <text x="1040" y="250" font-family="'SF Mono', ui-monospace, Menlo, monospace" font-size="12" letter-spacing="1.5" fill="#888780">DISCIPLINE</text>
  <text x="1490" y="250" text-anchor="end" font-size="15" font-weight="400" fill="#F5F5F2">Inventor · Engineer</text>
  <rect x="1040" y="268" width="450" height="1" fill="#F5F5F2" fill-opacity="0.06"/>
  <text x="1040" y="302" font-family="'SF Mono', ui-monospace, Menlo, monospace" font-size="12" letter-spacing="1.5" fill="#888780">BASE</text>
  <text x="1490" y="302" text-anchor="end" font-size="15" font-weight="400" fill="#F5F5F2">Bengaluru · UTC+05:30</text>
  <rect x="1040" y="320" width="450" height="1" fill="#F5F5F2" fill-opacity="0.06"/>
  <text x="1040" y="354" font-family="'SF Mono', ui-monospace, Menlo, monospace" font-size="12" letter-spacing="1.5" fill="#888780">FOCUS</text>
  <text x="1490" y="354" text-anchor="end" font-size="15" font-weight="400" fill="#F5F5F2">Air-gapped AI · acoustic auth</text>
  <rect x="1040" y="372" width="450" height="1" fill="#F5F5F2" fill-opacity="0.06"/>
  <text x="1040" y="406" font-family="'SF Mono', ui-monospace, Menlo, monospace" font-size="12" letter-spacing="1.5" fill="#888780">STUDY</text>
  <text x="1490" y="406" text-anchor="end" font-size="15" font-weight="400" fill="#F5F5F2">Manipal · CS '27</text>
  <rect x="1040" y="424" width="450" height="1" fill="#F5F5F2" fill-opacity="0.06"/>
  <text x="1040" y="458" font-family="'SF Mono', ui-monospace, Menlo, monospace" font-size="12" letter-spacing="1.5" fill="#888780">PATENTS</text>
  <text x="1490" y="458" text-anchor="end" font-size="15" font-weight="400" fill="#F5F5F2">20 applications · published</text>
  <rect x="1040" y="476" width="450" height="1" fill="#F5F5F2" fill-opacity="0.06"/>
  <text x="1040" y="510" font-family="'SF Mono', ui-monospace, Menlo, monospace" font-size="12" letter-spacing="1.5" fill="#888780">VENTURES</text>
  <text x="1490" y="510" text-anchor="end" font-size="15" font-weight="400" fill="#F5F5F2">Co-founder · Bastian Build</text>
  <rect x="1040" y="528" width="450" height="1" fill="#F5F5F2" fill-opacity="0.06"/>
  <text x="1040" y="562" font-family="'SF Mono', ui-monospace, Menlo, monospace" font-size="12" letter-spacing="1.5" fill="#888780">STATUS</text>
  <text x="1490" y="562" text-anchor="end" font-size="15" font-weight="400" fill="#C9A876">Shipping</text>
</svg>
