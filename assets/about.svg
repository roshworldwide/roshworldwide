<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 760" width="1600" height="760" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Helvetica, Arial, sans-serif" role="img" aria-label="About. The world runs on fragile systems. I build the engines that replace them. Computer science at Manipal, class of 2027, co-founder of an air-gapped infrastructure company, inventor of record on 7 patent applications. Discipline: inventor and engineer. Base: Bengaluru. Focus: air-gapped AI and acoustic auth. Status: shipping.">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#0B0B0D"/><stop offset="1" stop-color="#0A0A0C"/></linearGradient>
    <linearGradient id="goldH" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#E8D4A2"/><stop offset="1" stop-color="#B7935F"/></linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0.4" y2="1"><stop offset="0" stop-color="#ffffff" stop-opacity="0.045"/><stop offset="1" stop-color="#ffffff" stop-opacity="0.012"/></linearGradient>
    <linearGradient id="spec" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#C9A876" stop-opacity="0.4"/><stop offset="0.5" stop-color="#C9A876" stop-opacity="0.05"/><stop offset="1" stop-color="#C9A876" stop-opacity="0.18"/></linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5"><stop offset="0" stop-color="#C9A876" stop-opacity="0.10"/><stop offset="1" stop-color="#C9A876" stop-opacity="0"/></radialGradient>
    <filter id="grain"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/><feColorMatrix type="saturate" values="0"/></filter>
  </defs>
  <rect width="1600" height="760" fill="url(#bg)"/>
  <ellipse cx="1180" cy="560" rx="520" ry="360" fill="url(#glow)"/>
  <rect width="1600" height="760" filter="url(#grain)" opacity="0.04"/>

  <!-- header -->
  <text x="64" y="70" font-size="23" font-weight="700" letter-spacing="1"><tspan fill="#C9A876">// </tspan><tspan fill="#F2F1EC">ABOUT</tspan></text>
  <line x1="220" y1="63" x2="1400" y2="63" stroke="#26241E" stroke-width="1"/>
  <text x="1536" y="68" text-anchor="end" font-family="ui-monospace,'SF Mono',Menlo,monospace" font-size="12.5" letter-spacing="2.6" fill="#837F77">THE OPERATING PHILOSOPHY</text>

  <!-- panel -->
  <rect x="48" y="100" width="1504" height="628" rx="26" fill="url(#card)"/>
  <rect x="48.6" y="100.6" width="1502.8" height="626.8" rx="25.4" fill="none" stroke="url(#spec)" stroke-width="1.2"/>

  <!-- headline -->
  <text x="104" y="196" font-size="40" font-weight="700" letter-spacing="-0.8" fill="#F6F5F1">The world runs on fragile systems.</text>
  <text x="104" y="248" font-size="40" font-weight="700" letter-spacing="-0.8" fill="#F6F5F1">I build the engines that <tspan fill="url(#goldH)">replace them.</tspan></text>
  <line x1="104" y1="292" x2="1448" y2="292" stroke="#211F1A" stroke-width="1"/>

  <!-- bio (left) -->
  <g font-size="16" fill="#B4B0A7" font-weight="450">
    <text x="104" y="344">Zero-latency financial networks. Acoustic authentication that cannot be spoofed —</text>
    <text x="104" y="372">7 patent applications, deployed across a campus at 99.9% uptime. A 14-billion-</text>
    <text x="104" y="400">parameter model that diagnoses and fixes servers with zero bytes leaving the</text>
    <text x="104" y="428">machine. My work lives where failure is not an option.</text>

    <text x="104" y="486">Most engineers write code to ship features. I engineer infrastructure to set the</text>
    <text x="104" y="514">standard. When a system has to be secure, scalable, and exact, it takes a different</text>
    <text x="104" y="542">kind of architecture — one that earns its claims in production, not in a pitch.</text>

    <text x="104" y="600">Computer science at Manipal, Bengaluru, Class of ’27. Co-founder of an air-gapped</text>
    <text x="104" y="628">infrastructure company. Inventor of record on 7 patent applications, filed. One</text>
    <text x="104" y="656">rule across every domain: ship to production, measure everything, send nothing home.</text>
  </g>

  <!-- spec table (right) -->
  <g font-family="ui-monospace,'SF Mono',Menlo,monospace">
    <g transform="translate(0,344)">
      <text x="1000" y="0" font-size="12" letter-spacing="2.4" fill="#837F77">DISCIPLINE</text><text x="1448" y="0" text-anchor="end" font-size="14.5" fill="#DAD7CF">Inventor · Engineer</text><line x1="1000" y1="18" x2="1448" y2="18" stroke="#211F1A"/>
    </g>
    <g transform="translate(0,388)">
      <text x="1000" y="0" font-size="12" letter-spacing="2.4" fill="#837F77">BASE</text><text x="1448" y="0" text-anchor="end" font-size="14.5" fill="#DAD7CF">Bengaluru · UTC +05:30</text><line x1="1000" y1="18" x2="1448" y2="18" stroke="#211F1A"/>
    </g>
    <g transform="translate(0,432)">
      <text x="1000" y="0" font-size="12" letter-spacing="2.4" fill="#837F77">FOCUS</text><text x="1448" y="0" text-anchor="end" font-size="14.5" fill="#DAD7CF">Air-gapped AI · Acoustic auth</text><line x1="1000" y1="18" x2="1448" y2="18" stroke="#211F1A"/>
    </g>
    <g transform="translate(0,476)">
      <text x="1000" y="0" font-size="12" letter-spacing="2.4" fill="#837F77">STUDY</text><text x="1448" y="0" text-anchor="end" font-size="14.5" fill="#DAD7CF">Manipal · CS ’27</text><line x1="1000" y1="18" x2="1448" y2="18" stroke="#211F1A"/>
    </g>
    <g transform="translate(0,520)">
      <text x="1000" y="0" font-size="12" letter-spacing="2.4" fill="#837F77">PATENTS</text><text x="1448" y="0" text-anchor="end" font-size="14.5" fill="#DAD7CF">7 applications · filed</text><line x1="1000" y1="18" x2="1448" y2="18" stroke="#211F1A"/>
    </g>
    <g transform="translate(0,564)">
      <text x="1000" y="0" font-size="12" letter-spacing="2.4" fill="#837F77">VENTURES</text><text x="1448" y="0" text-anchor="end" font-size="14.5" fill="#DAD7CF">Co-founder · Bastian Build</text><line x1="1000" y1="18" x2="1448" y2="18" stroke="#211F1A"/>
    </g>
    <g transform="translate(0,608)">
      <text x="1000" y="0" font-size="12" letter-spacing="2.4" fill="#837F77">STATUS</text>
      <text x="1448" y="0" text-anchor="end" font-size="14.5" font-weight="700" fill="url(#goldH)">● Shipping</text>
    </g>
  </g>

  <!-- signature -->
  <line x1="640" y1="690" x2="720" y2="690" stroke="#3A382F"/>
  <text x="800" y="695" text-anchor="middle" font-size="16" font-weight="600" fill="#CFCCC3">That standard is <tspan fill="url(#goldH)" font-weight="700">Engineered by RoSh.</tspan></text>
  <line x1="880" y1="690" x2="960" y2="690" stroke="#3A382F"/>
</svg>
