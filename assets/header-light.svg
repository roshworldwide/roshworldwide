<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 660" width="1280" height="660" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Helvetica, Arial, sans-serif" role="img" aria-label="Roshan Raj — First-Principles Systems Engineer and AI-Infrastructure Architect. Ships production systems most teams only prototype. 330K writes per second, 142M+ states formally verified, 99.9% uptime for 5,000+ users, 7 patents pending.">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#EEF0F6"/>
      <stop offset="0.6" stop-color="#F7F8FC"/>
      <stop offset="1" stop-color="#EEF0F6"/>
    </linearGradient>
    <radialGradient id="bBlue"><stop offset="0" stop-color="#0A84FF"/><stop offset="0.7" stop-color="#0A84FF" stop-opacity="0"/></radialGradient>
    <radialGradient id="bPurple"><stop offset="0" stop-color="#BF5AF2"/><stop offset="0.7" stop-color="#BF5AF2" stop-opacity="0"/></radialGradient>
    <radialGradient id="bTeal"><stop offset="0" stop-color="#64D2FF"/><stop offset="0.7" stop-color="#64D2FF" stop-opacity="0"/></radialGradient>
    <radialGradient id="bPink"><stop offset="0" stop-color="#FF375F"/><stop offset="0.7" stop-color="#FF375F" stop-opacity="0"/></radialGradient>
    <radialGradient id="bIndigo"><stop offset="0" stop-color="#5E5CE6"/><stop offset="0.7" stop-color="#5E5CE6" stop-opacity="0"/></radialGradient>
    <linearGradient id="nameGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0.35" stop-color="#0B0B0F"/>
      <stop offset="1" stop-color="#0B0B0F" stop-opacity="0.55"/>
    </linearGradient>
    <linearGradient id="numGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0B0B0F"/>
      <stop offset="1" stop-color="#0057d9"/>
    </linearGradient>
    <linearGradient id="mono" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0A84FF"/><stop offset="0.55" stop-color="#5E5CE6"/><stop offset="1" stop-color="#BF5AF2"/>
    </linearGradient>
    <linearGradient id="spec" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.85"/>
      <stop offset="0.4" stop-color="#ffffff" stop-opacity="0.06"/>
      <stop offset="0.62" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="shimmer" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="blur" x="-30%" y="-30%" width="160%" height="160%"><feGaussianBlur stdDeviation="46"/></filter>
    <filter id="grain"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/><feColorMatrix type="saturate" values="0"/></filter>
    <clipPath id="glassClip">
      <rect x="28" y="28" width="1224" height="336" rx="32"/>
      <rect x="28" y="396" width="292" height="172" rx="26"/>
      <rect x="338" y="396" width="292" height="172" rx="26"/>
      <rect x="648" y="396" width="292" height="172" rx="26"/>
      <rect x="958" y="396" width="292" height="172" rx="26"/>
    </clipPath>
  </defs>

  <!-- background -->
  <rect width="1280" height="660" fill="url(#bg)"/>

  <!-- ambient drifting light blobs -->
  <g opacity="0.4" filter="url(#blur)">
    <circle cx="150" cy="90" r="240" fill="url(#bBlue)">
      <animateTransform attributeName="transform" type="translate" values="0 0; 34 24; -12 30; 0 0" keyTimes="0;0.4;0.72;1" dur="19s" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.9;1;0.8;0.9" dur="13s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1140" cy="120" r="220" fill="url(#bPurple)">
      <animateTransform attributeName="transform" type="translate" values="0 0; -30 20; 14 -18; 0 0" keyTimes="0;0.4;0.7;1" dur="23s" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.85;0.7;0.95;0.85" dur="17s" repeatCount="indefinite"/>
    </circle>
    <circle cx="520" cy="470" r="230" fill="url(#bTeal)">
      <animateTransform attributeName="transform" type="translate" values="0 0; 26 -22; -18 -8; 0 0" keyTimes="0;0.45;0.75;1" dur="21s" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.7;0.9;0.6;0.7" dur="15s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1060" cy="520" r="190" fill="url(#bPink)">
      <animateTransform attributeName="transform" type="translate" values="0 0; -22 -16; 12 20; 0 0" keyTimes="0;0.4;0.7;1" dur="25s" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0.8;0.5;0.6" dur="19s" repeatCount="indefinite"/>
    </circle>
    <circle cx="760" cy="150" r="180" fill="url(#bIndigo)">
      <animateTransform attributeName="transform" type="translate" values="0 0; 18 26; -16 -14; 0 0" keyTimes="0;0.5;0.78;1" dur="27s" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- film grain -->
  <rect width="1280" height="660" filter="url(#grain)" opacity="0.05"/>

  <!-- ========== HERO PANEL ========== -->
  <rect x="28" y="28" width="1224" height="336" rx="32" fill="rgba(255,255,255,0.66)"/>
  <rect x="28.5" y="28.5" width="1223" height="335" rx="31.5" fill="none" stroke="url(#spec)" stroke-width="1.2"/>
  <rect x="46" y="30" width="1188" height="1.4" rx="0.7" fill="rgba(255,255,255,0.5)" opacity="0.6"/>

  <!-- eyebrow -->
  <g>
    <circle cx="86" cy="90" r="10" fill="#64D2FF" opacity="0.28"><animate attributeName="r" values="8;13;8" dur="2.6s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.28;0.05;0.28" dur="2.6s" repeatCount="indefinite"/></circle>
    <circle cx="86" cy="90" r="5" fill="#64D2FF"><animate attributeName="opacity" values="1;0.45;1" dur="2.6s" repeatCount="indefinite"/></circle>
    <text x="104" y="96" font-size="15" font-weight="600" letter-spacing="2.4" fill="#5C5C66">FIRST-PRINCIPLES SYSTEMS · AI INFRASTRUCTURE</text>
  </g>

  <!-- monogram -->
  <g opacity="0">
    <rect x="1168" y="52" width="58" height="58" rx="17" fill="url(#mono)"/>
    <rect x="1168.5" y="52.5" width="57" height="57" rx="16.5" fill="none" stroke="#ffffff" stroke-opacity="0.4"/>
    <text x="1197" y="91" font-size="23" font-weight="800" letter-spacing="-1" fill="#ffffff" text-anchor="middle">RR</text>
    <animate attributeName="opacity" values="0;1" dur="0.7s" begin="0.1s" fill="freeze"/>
  </g>

  <!-- name -->
  <text x="74" y="232" font-size="92" font-weight="800" letter-spacing="-3" fill="url(#nameGrad)" opacity="0">
    Roshan Raj
    <animate attributeName="opacity" values="0;1" dur="0.85s" begin="0.15s" fill="freeze"/>
    <animateTransform attributeName="transform" type="translate" values="0 18;0 0" dur="0.95s" begin="0.15s" calcMode="spline" keySplines="0.16 1 0.3 1" fill="freeze"/>
  </text>

  <!-- tagline -->
  <text x="76" y="288" font-size="27" font-weight="500" letter-spacing="-0.3" fill="#3C3C43" opacity="0">
    Ships production systems most teams only prototype.
    <animate attributeName="opacity" values="0;1" dur="0.8s" begin="0.34s" fill="freeze"/>
    <animateTransform attributeName="transform" type="translate" values="0 14;0 0" dur="0.9s" begin="0.34s" calcMode="spline" keySplines="0.16 1 0.3 1" fill="freeze"/>
  </text>

  <!-- metric chips -->
  <g opacity="0"><animate attributeName="opacity" values="0;1" dur="0.7s" begin="0.5s" fill="freeze"/><animateTransform attributeName="transform" type="translate" values="0 12;0 0" dur="0.8s" begin="0.5s" calcMode="spline" keySplines="0.16 1 0.3 1" fill="freeze"/>
    <rect x="76" y="316" width="182" height="42" rx="13" fill="rgba(255,255,255,0.72)"/><rect x="76.5" y="316.5" width="181" height="41" rx="12.5" fill="none" stroke="rgba(10,20,60,0.12)"/>
    <circle cx="97" cy="337" r="4.5" fill="#0A84FF"/><text x="112" y="342" font-size="16.5" font-weight="600" fill="#0B0B0F">330K writes/s</text>
  </g>
  <g opacity="0"><animate attributeName="opacity" values="0;1" dur="0.7s" begin="0.6s" fill="freeze"/><animateTransform attributeName="transform" type="translate" values="0 12;0 0" dur="0.8s" begin="0.6s" calcMode="spline" keySplines="0.16 1 0.3 1" fill="freeze"/>
    <rect x="274" y="316" width="240" height="42" rx="13" fill="rgba(255,255,255,0.72)"/><rect x="274.5" y="316.5" width="239" height="41" rx="12.5" fill="none" stroke="rgba(10,20,60,0.12)"/>
    <circle cx="295" cy="337" r="4.5" fill="#64D2FF"/><text x="310" y="342" font-size="16.5" font-weight="600" fill="#0B0B0F">142M+ states verified</text>
  </g>
  <g opacity="0"><animate attributeName="opacity" values="0;1" dur="0.7s" begin="0.7s" fill="freeze"/><animateTransform attributeName="transform" type="translate" values="0 12;0 0" dur="0.8s" begin="0.7s" calcMode="spline" keySplines="0.16 1 0.3 1" fill="freeze"/>
    <rect x="530" y="316" width="328" height="42" rx="13" fill="rgba(255,255,255,0.72)"/><rect x="530.5" y="316.5" width="327" height="41" rx="12.5" fill="none" stroke="rgba(10,20,60,0.12)"/>
    <circle cx="551" cy="337" r="4.5" fill="#BF5AF2"/><text x="566" y="342" font-size="16.5" font-weight="600" fill="#0B0B0F">Air-gapped LLM inference</text>
  </g>
  <g opacity="0"><animate attributeName="opacity" values="0;1" dur="0.7s" begin="0.8s" fill="freeze"/><animateTransform attributeName="transform" type="translate" values="0 12;0 0" dur="0.8s" begin="0.8s" calcMode="spline" keySplines="0.16 1 0.3 1" fill="freeze"/>
    <rect x="874" y="316" width="244" height="42" rx="13" fill="rgba(255,255,255,0.72)"/><rect x="874.5" y="316.5" width="243" height="41" rx="12.5" fill="none" stroke="rgba(10,20,60,0.12)"/>
    <circle cx="895" cy="337" r="4.5" fill="#30D158"/><text x="910" y="342" font-size="16.5" font-weight="600" fill="#0B0B0F">7 patents pending</text>
  </g>

  <!-- ========== STAT CARDS ========== -->
  <g opacity="0"><animate attributeName="opacity" values="0;1" dur="0.7s" begin="0.72s" fill="freeze"/><animateTransform attributeName="transform" type="translate" values="0 16;0 0" dur="0.85s" begin="0.72s" calcMode="spline" keySplines="0.16 1 0.3 1" fill="freeze"/>
    <rect x="28" y="396" width="292" height="172" rx="26" fill="rgba(255,255,255,0.66)"/><rect x="28.5" y="396.5" width="291" height="171" rx="25.5" fill="none" stroke="url(#spec)" stroke-width="1.2"/>
    <text x="62" y="488" font-size="44" font-weight="800" letter-spacing="-1.4" fill="url(#numGrad)">330K</text>
    <text x="62" y="522" font-size="15" font-weight="500" fill="#5C5C66">durable writes / second</text>
  </g>
  <g opacity="0"><animate attributeName="opacity" values="0;1" dur="0.7s" begin="0.84s" fill="freeze"/><animateTransform attributeName="transform" type="translate" values="0 16;0 0" dur="0.85s" begin="0.84s" calcMode="spline" keySplines="0.16 1 0.3 1" fill="freeze"/>
    <rect x="338" y="396" width="292" height="172" rx="26" fill="rgba(255,255,255,0.66)"/><rect x="338.5" y="396.5" width="291" height="171" rx="25.5" fill="none" stroke="url(#spec)" stroke-width="1.2"/>
    <text x="372" y="488" font-size="44" font-weight="800" letter-spacing="-1.4" fill="url(#numGrad)">142M+</text>
    <text x="372" y="522" font-size="15" font-weight="500" fill="#5C5C66">states formally verified</text>
  </g>
  <g opacity="0"><animate attributeName="opacity" values="0;1" dur="0.7s" begin="0.96s" fill="freeze"/><animateTransform attributeName="transform" type="translate" values="0 16;0 0" dur="0.85s" begin="0.96s" calcMode="spline" keySplines="0.16 1 0.3 1" fill="freeze"/>
    <rect x="648" y="396" width="292" height="172" rx="26" fill="rgba(255,255,255,0.66)"/><rect x="648.5" y="396.5" width="291" height="171" rx="25.5" fill="none" stroke="url(#spec)" stroke-width="1.2"/>
    <text x="682" y="488" font-size="44" font-weight="800" letter-spacing="-1.4" fill="url(#numGrad)">99.9%</text>
    <text x="682" y="522" font-size="15" font-weight="500" fill="#5C5C66">uptime · 5,000+ users</text>
  </g>
  <g opacity="0"><animate attributeName="opacity" values="0;1" dur="0.7s" begin="1.08s" fill="freeze"/><animateTransform attributeName="transform" type="translate" values="0 16;0 0" dur="0.85s" begin="1.08s" calcMode="spline" keySplines="0.16 1 0.3 1" fill="freeze"/>
    <rect x="958" y="396" width="292" height="172" rx="26" fill="rgba(255,255,255,0.66)"/><rect x="958.5" y="396.5" width="291" height="171" rx="25.5" fill="none" stroke="url(#spec)" stroke-width="1.2"/>
    <text x="992" y="488" font-size="44" font-weight="800" letter-spacing="-1.4" fill="url(#numGrad)">7</text>
    <text x="992" y="522" font-size="15" font-weight="500" fill="#5C5C66">patents pending</text>
  </g>

  <!-- ========== SHIMMER SWEEP across all glass ========== -->
  <g clip-path="url(#glassClip)">
    <g transform="skewX(-16)">
      <rect x="-360" y="-60" width="150" height="820" fill="url(#shimmer)">
        <animate attributeName="x" values="-360;-360;1520;1520" keyTimes="0;0.16;0.52;1" dur="7s" begin="1.2s" repeatCount="indefinite"/>
      </rect>
    </g>
  </g>
</svg>
