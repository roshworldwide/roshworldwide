  <text x="990" y="215" text-anchor="middle" font-size="64" font-weight="600" fill="#F5F5F2"><animateTransform attributeName="transform" type="translate" calcMode="spline" dur="0.6s" begin="0.2s" fill="freeze" keyTimes="0;1" values="0,-7;0,0" keySplines="0.5 0 0.1 1"/>32</text>
  <text x="990" y="258" text-anchor="middle" font-family="'SF Mono', ui-monospace, Menlo, monospace" font-size="11" letter-spacing="2" fill="#888780">REPOSITORIES</text>
