    <ellipse cx="1260" cy="200" rx="420" ry="260" fill="url(#lfMid)"><animateTransform attributeName="transform" type="translate" calcMode="spline" dur="23s" repeatCount="indefinite" keyTimes="0;0.5;1" values="0,0;-44,-12;0,0" keySplines="0.5 0 0.1 1;0.5 0 0.1 1"/></ellipse>
