<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 500" width="1600" height="500" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Helvetica, Arial, sans-serif" role="img" aria-label="Proof. 7 patent filings, 2 hackathons won, 1 company co-founded, 10+ industrial projects to ship in 2026. Find the problem, invent the fix, ship to production, file the patent, repeat.">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#0B0B0D"/><stop offset="1" stop-color="#0A0A0C"/></linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0.3" y2="1"><stop offset="0" stop-color="#F0DDA9"/><stop offset="0.5" stop-color="#C9A876"/><stop offset="1" stop-color="#9E7E52"/></linearGradient>
    <linearGradient id="goldH" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#E8D4A2"/><stop offset="1" stop-color="#B7935F"/></linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#ffffff" stop-opacity="0.045"/><stop offset="1" stop-color="#ffffff" stop-opacity="0.012"/></linearGradient>
    <linearGradient id="spec" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#C9A876" stop-opacity="0.45"/><stop offset="0.5" stop-color="#C9A876" stop-opacity="0.05"/><stop offset="1" stop-color="#C9A876" stop-opacity="0.2"/></linearGradient>
    <filter id="grain"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/><feColorMatrix type="saturate" values="0"/></filter>
  </defs>
  <rect width="1600" height="500" fill="url(#bg)"/>
  <rect width="1600" height="500" filter="url(#grain)" opacity="0.04"/>

  <!-- section header -->
  <text x="64" y="70" font-size="23" font-weight="700" letter-spacing="1"><tspan fill="#C9A876">// </tspan><tspan fill="#F2F1EC">PROOF</tspan></text>
  <line x1="220" y1="63" x2="1400" y2="63" stroke="#26241E" stroke-width="1"/>
  <text x="1536" y="68" text-anchor="end" font-family="ui-monospace,'SF Mono',Menlo,monospace" font-size="12.5" letter-spacing="2.6" fill="#837F77">PROVEN IN PRODUCTION</text>

  <!-- cards -->
  <g font-family="ui-monospace,'SF Mono',Menlo,monospace">
    <!-- card template repeated with data -->
    <!-- 01 -->
    <g transform="translate(64,112)">
      <rect width="350" height="248" rx="22" fill="url(#card)"/>
      <rect x="0.6" y="0.6" width="348.8" height="246.8" rx="21.4" fill="none" stroke="url(#spec)" stroke-width="1.2"/>
      <rect x="30" y="0" width="46" height="3" fill="url(#goldH)"/>
      <text x="30" y="52" font-size="13" letter-spacing="3" fill="#C9A876">01</text>
      <text x="320" y="52" text-anchor="end" font-size="15" fill="#C9A876">✦</text>
      <text x="28" y="172" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display',Helvetica,Arial,sans-serif" font-size="88" font-weight="800" letter-spacing="-3" fill="url(#gold)">7</text>
      <text x="30" y="206" font-size="13" letter-spacing="2.4" fill="#C4C0B7">PATENT FILINGS</text>
      <text x="30" y="228" font-size="11" letter-spacing="1.8" fill="#837F77">ROSHAN RAJ · INVENTOR</text>
    </g>
    <!-- 02 -->
    <g transform="translate(438,112)">
      <rect width="350" height="248" rx="22" fill="url(#card)"/>
      <rect x="0.6" y="0.6" width="348.8" height="246.8" rx="21.4" fill="none" stroke="url(#spec)" stroke-width="1.2"/>
      <rect x="30" y="0" width="46" height="3" fill="url(#goldH)"/>
      <text x="30" y="52" font-size="13" letter-spacing="3" fill="#C9A876">02</text>
      <text x="320" y="52" text-anchor="end" font-size="15" fill="#C9A876">✦</text>
      <text x="28" y="172" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display',Helvetica,Arial,sans-serif" font-size="88" font-weight="800" letter-spacing="-3" fill="url(#gold)">2</text>
      <text x="30" y="206" font-size="13" letter-spacing="2.4" fill="#C4C0B7">HACKATHONS WON</text>
      <text x="30" y="228" font-size="11" letter-spacing="1.8" fill="#837F77">AND COUNTING…</text>
    </g>
    <!-- 03 -->
    <g transform="translate(812,112)">
      <rect width="350" height="248" rx="22" fill="url(#card)"/>
      <rect x="0.6" y="0.6" width="348.8" height="246.8" rx="21.4" fill="none" stroke="url(#spec)" stroke-width="1.2"/>
      <rect x="30" y="0" width="46" height="3" fill="url(#goldH)"/>
      <text x="30" y="52" font-size="13" letter-spacing="3" fill="#C9A876">03</text>
      <text x="320" y="52" text-anchor="end" font-size="15" fill="#C9A876">✦</text>
      <text x="28" y="172" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display',Helvetica,Arial,sans-serif" font-size="88" font-weight="800" letter-spacing="-3" fill="url(#gold)">1</text>
      <text x="30" y="206" font-size="13" letter-spacing="2.4" fill="#C4C0B7">COMPANY</text>
      <text x="30" y="228" font-size="11" letter-spacing="1.8" fill="#837F77">CO-FOUNDED · BASTIAN BUILD</text>
    </g>
    <!-- 04 -->
    <g transform="translate(1186,112)">
      <rect width="350" height="248" rx="22" fill="url(#card)"/>
      <rect x="0.6" y="0.6" width="348.8" height="246.8" rx="21.4" fill="none" stroke="url(#spec)" stroke-width="1.2"/>
      <rect x="30" y="0" width="46" height="3" fill="url(#goldH)"/>
      <text x="30" y="52" font-size="13" letter-spacing="3" fill="#C9A876">04</text>
      <text x="320" y="52" text-anchor="end" font-size="15" fill="#C9A876">✦</text>
      <text x="28" y="172" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display',Helvetica,Arial,sans-serif" font-size="88" font-weight="800" letter-spacing="-3" fill="url(#gold)">10+</text>
      <text x="30" y="206" font-size="13" letter-spacing="2.4" fill="#C4C0B7">INDUSTRIAL PROJECTS · 2026</text>
      <text x="30" y="228" font-size="11" letter-spacing="1.8" fill="#837F77">TO BE SHIPPED THIS YEAR</text>
    </g>
  </g>

  <!-- process line -->
  <text x="800" y="436" text-anchor="middle" font-size="18" font-weight="500" fill="#B7B3AA">Find the problem.<tspan fill="#C9A876" font-weight="700">  →  </tspan>Invent the fix.<tspan fill="#C9A876" font-weight="700">  →  </tspan>Ship to production.<tspan fill="#C9A876" font-weight="700">  →  </tspan>File the patent.<tspan fill="#C9A876" font-weight="700">  →  </tspan><tspan font-weight="800" fill="#F2F1EC">Repeat.</tspan></text>
</svg>
