<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 720" width="1600" height="720" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Helvetica, Arial, sans-serif" role="img" aria-label="Patent wall. Seven patent applications filed in 2026. 01 Acoustic Proximity Authentication. 02 Negative-Latency Collaborative Editing. 03 Semantic Clipboard. 04 Privacy-Preserving Crash Reproduction. 05 On-Device Pre-Update Regression Certification. 06 Unified Fidelity-Budget Scheduler. 07 Dynamically Morphing Ergonomic Keyboard.">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#0B0B0D"/><stop offset="1" stop-color="#0A0A0C"/></linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0.3" y2="1"><stop offset="0" stop-color="#F0DDA9"/><stop offset="0.5" stop-color="#C9A876"/><stop offset="1" stop-color="#9E7E52"/></linearGradient>
    <linearGradient id="goldH" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#E8D4A2"/><stop offset="1" stop-color="#B7935F"/></linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0.5" y2="1"><stop offset="0" stop-color="#ffffff" stop-opacity="0.04"/><stop offset="1" stop-color="#ffffff" stop-opacity="0.01"/></linearGradient>
    <linearGradient id="spec" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#C9A876" stop-opacity="0.4"/><stop offset="0.5" stop-color="#C9A876" stop-opacity="0.05"/><stop offset="1" stop-color="#C9A876" stop-opacity="0.18"/></linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5"><stop offset="0" stop-color="#C9A876" stop-opacity="0.10"/><stop offset="1" stop-color="#C9A876" stop-opacity="0"/></radialGradient>
    <filter id="grain"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/><feColorMatrix type="saturate" values="0"/></filter>
  </defs>
  <rect width="1600" height="720" fill="url(#bg)"/>
  <ellipse cx="300" cy="260" rx="480" ry="320" fill="url(#glow)"/>
  <rect width="1600" height="720" filter="url(#grain)" opacity="0.04"/>

  <!-- header -->
  <text x="64" y="70" font-size="23" font-weight="700" letter-spacing="1"><tspan fill="#C9A876">// </tspan><tspan fill="#F2F1EC">PATENT WALL</tspan></text>
  <line x1="300" y1="63" x2="1400" y2="63" stroke="#26241E" stroke-width="1"/>
  <text x="1536" y="68" text-anchor="end" font-family="ui-monospace,'SF Mono',Menlo,monospace" font-size="12.5" letter-spacing="2.6" fill="#837F77">SEVEN · FILED · UNSPOOFABLE</text>

  <!-- panel -->
  <rect x="48" y="100" width="1504" height="576" rx="26" fill="url(#card)"/>
  <rect x="48.6" y="100.6" width="1502.8" height="574.8" rx="25.4" fill="none" stroke="url(#spec)" stroke-width="1.2"/>

  <!-- registry caption -->
  <text x="104" y="152" font-family="ui-monospace,'SF Mono',Menlo,monospace" font-size="12.5" letter-spacing="2.8" fill="#9A7F55">PATENT PORTFOLIO · FILED 2026 · INVENTOR: ROSHAN RAJ · APPLICANT: MAHE</text>

  <!-- big count + statement -->
  <text x="104" y="248" font-size="82" font-weight="800" letter-spacing="-3" fill="url(#gold)">7</text>
  <line x1="214" y1="188" x2="214" y2="244" stroke="#3A382F" stroke-width="1.4"/>
  <text x="248" y="212" font-family="ui-monospace,'SF Mono',Menlo,monospace" font-size="13" letter-spacing="2.6" fill="#C9A876">PATENT APPLICATIONS · FILED</text>
  <text x="248" y="240" font-size="19" font-weight="500" fill="#B7B3AA">Different domains — one rule: <tspan fill="#EDECE7" font-weight="650">it cannot be spoofed.</tspan></text>

  <line x1="104" y1="286" x2="1448" y2="286" stroke="#211F1A" stroke-width="1"/>

  <!-- 7-row registry -->
  <g>
    <!-- row -->
    <g transform="translate(0,326)">
      <text x="104" y="0" font-family="ui-monospace,'SF Mono',Menlo,monospace" font-size="14" letter-spacing="1" fill="url(#goldH)">01</text>
      <text x="170" y="0" font-size="19.5" font-weight="600" fill="#EDECE7">Acoustic Proximity Authentication</text>
      <text x="1448" y="0" text-anchor="end" font-family="ui-monospace,'SF Mono',Menlo,monospace" font-size="11.5" letter-spacing="2.4" fill="#7C786F">AUTHENTICATION</text>
      <line x1="104" y1="20" x2="1448" y2="20" stroke="#1C1B17"/>
    </g>
    <g transform="translate(0,374)">
      <text x="104" y="0" font-family="ui-monospace,'SF Mono',Menlo,monospace" font-size="14" letter-spacing="1" fill="url(#goldH)">02</text>
      <text x="170" y="0" font-size="19.5" font-weight="600" fill="#EDECE7">Negative-Latency Collaborative Editing</text>
      <text x="1448" y="0" text-anchor="end" font-family="ui-monospace,'SF Mono',Menlo,monospace" font-size="11.5" letter-spacing="2.4" fill="#7C786F">COLLABORATION</text>
      <line x1="104" y1="20" x2="1448" y2="20" stroke="#1C1B17"/>
    </g>
    <g transform="translate(0,422)">
      <text x="104" y="0" font-family="ui-monospace,'SF Mono',Menlo,monospace" font-size="14" letter-spacing="1" fill="url(#goldH)">03</text>
      <text x="170" y="0" font-size="19.5" font-weight="600" fill="#EDECE7">Semantic Clipboard</text>
      <text x="1448" y="0" text-anchor="end" font-family="ui-monospace,'SF Mono',Menlo,monospace" font-size="11.5" letter-spacing="2.4" fill="#7C786F">INTERACTION</text>
      <line x1="104" y1="20" x2="1448" y2="20" stroke="#1C1B17"/>
    </g>
    <g transform="translate(0,470)">
      <text x="104" y="0" font-family="ui-monospace,'SF Mono',Menlo,monospace" font-size="14" letter-spacing="1" fill="url(#goldH)">04</text>
      <text x="170" y="0" font-size="19.5" font-weight="600" fill="#EDECE7">Privacy-Preserving Crash Reproduction</text>
      <text x="1448" y="0" text-anchor="end" font-family="ui-monospace,'SF Mono',Menlo,monospace" font-size="11.5" letter-spacing="2.4" fill="#7C786F">PRIVACY</text>
      <line x1="104" y1="20" x2="1448" y2="20" stroke="#1C1B17"/>
    </g>
    <g transform="translate(0,518)">
      <text x="104" y="0" font-family="ui-monospace,'SF Mono',Menlo,monospace" font-size="14" letter-spacing="1" fill="url(#goldH)">05</text>
      <text x="170" y="0" font-size="19.5" font-weight="600" fill="#EDECE7">On-Device Pre-Update Regression Certification</text>
      <text x="1448" y="0" text-anchor="end" font-family="ui-monospace,'SF Mono',Menlo,monospace" font-size="11.5" letter-spacing="2.4" fill="#7C786F">RELIABILITY</text>
      <line x1="104" y1="20" x2="1448" y2="20" stroke="#1C1B17"/>
    </g>
    <g transform="translate(0,566)">
      <text x="104" y="0" font-family="ui-monospace,'SF Mono',Menlo,monospace" font-size="14" letter-spacing="1" fill="url(#goldH)">06</text>
      <text x="170" y="0" font-size="19.5" font-weight="600" fill="#EDECE7">Unified Fidelity-Budget Scheduler</text>
      <text x="1448" y="0" text-anchor="end" font-family="ui-monospace,'SF Mono',Menlo,monospace" font-size="11.5" letter-spacing="2.4" fill="#7C786F">SCHEDULING</text>
      <line x1="104" y1="20" x2="1448" y2="20" stroke="#1C1B17"/>
    </g>
    <g transform="translate(0,614)">
      <text x="104" y="0" font-family="ui-monospace,'SF Mono',Menlo,monospace" font-size="14" letter-spacing="1" fill="url(#goldH)">07</text>
      <text x="170" y="0" font-size="19.5" font-weight="600" fill="#EDECE7">Dynamically Morphing Ergonomic Keyboard</text>
      <text x="1448" y="0" text-anchor="end" font-family="ui-monospace,'SF Mono',Menlo,monospace" font-size="11.5" letter-spacing="2.4" fill="#7C786F">HARDWARE · HCI</text>
    </g>
  </g>
</svg>
