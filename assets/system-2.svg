<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 240" width="1600" height="240" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Inter Tight', system-ui, sans-serif">
  <defs>
    <filter id="blur55" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="55"/></filter>
    <filter id="blur70" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="70"/></filter>
    <radialGradient id="lfGold"><stop offset="0" stop-color="#C9A876" stop-opacity="0.12"/><stop offset="1" stop-color="#C9A876" stop-opacity="0"/></radialGradient>
    <radialGradient id="lfMid"><stop offset="0" stop-color="#1A2332" stop-opacity="0.18"/><stop offset="1" stop-color="#1A2332" stop-opacity="0"/></radialGradient>
    <radialGradient id="lfTit"><stop offset="0" stop-color="#A8A29A" stop-opacity="0.08"/><stop offset="1" stop-color="#A8A29A" stop-opacity="0"/></radialGradient>
    <radialGradient id="auGold"><stop offset="0" stop-color="#C9A876" stop-opacity="0.08"/><stop offset="1" stop-color="#C9A876" stop-opacity="0"/></radialGradient>
    <radialGradient id="auMid"><stop offset="0" stop-color="#1A2332" stop-opacity="0.14"/><stop offset="1" stop-color="#1A2332" stop-opacity="0"/></radialGradient>
    <linearGradient id="specBand" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#ffffff" stop-opacity="0"/><stop offset="0.5" stop-color="#ffffff" stop-opacity="0.07"/><stop offset="1" stop-color="#ffffff" stop-opacity="0"/></linearGradient>
    <linearGradient id="shimmer" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#ffffff" stop-opacity="0"/><stop offset="0.5" stop-color="#ffffff" stop-opacity="0.06"/><stop offset="1" stop-color="#ffffff" stop-opacity="0"/></linearGradient>
    <linearGradient id="edgeGrad" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#ffffff" stop-opacity="0"/><stop offset="0.5" stop-color="#ffffff" stop-opacity="0.22"/><stop offset="1" stop-color="#ffffff" stop-opacity="0"/></linearGradient>
    <linearGradient id="topGlow" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#ffffff" stop-opacity="0.06"/><stop offset="1" stop-color="#ffffff" stop-opacity="0"/></linearGradient>
    <linearGradient id="barLight" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#C9A876" stop-opacity="0.25"/><stop offset="0.5" stop-color="#EBD6A8" stop-opacity="0.95"/><stop offset="1" stop-color="#C9A876" stop-opacity="0.25"/></linearGradient>
    <linearGradient id="shine" gradientUnits="userSpaceOnUse" x1="-100" y1="-100" x2="100" y2="100"><stop offset="0" stop-color="#EBD6A8"/><stop offset="0.5" stop-color="#C9A876"/><stop offset="1" stop-color="#8A6D40"/></linearGradient>
    <linearGradient id="glintBand" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#EBD6A8" stop-opacity="0"/><stop offset="0.5" stop-color="#EBD6A8" stop-opacity="0.6"/><stop offset="1" stop-color="#EBD6A8" stop-opacity="0"/></linearGradient>
    <clipPath id="syclip"><rect x="40" y="20" width="1520" height="200" rx="28"/></clipPath>
  </defs>
  <rect width="1600" height="240" fill="#0E0E10"/>
  <g filter="url(#blur55)">
    <ellipse cx="360" cy="120" rx="420" ry="240" fill="url(#lfMid)"><animateTransform attributeName="transform" type="translate" calcMode="spline" dur="20s" repeatCount="indefinite" keyTimes="0;0.5;1" values="0,0;50,16;0,0" keySplines="0.5 0 0.1 1;0.5 0 0.1 1"/></ellipse>
  </g>
  <g fill="#F5F5F2">
    <circle cx="70" cy="40" r="1" opacity="0.05"><animate attributeName="opacity" calcMode="spline" dur="9s" repeatCount="indefinite" keyTimes="0;0.5;1" values="0.05;0.075;0.05" keySplines="0.5 0 0.1 1;0.5 0 0.1 1"/></circle>
    <circle cx="70" cy="200" r="1" opacity="0.045"><animate attributeName="opacity" calcMode="spline" dur="11s" repeatCount="indefinite" keyTimes="0;0.5;1" values="0.045;0.07;0.045" keySplines="0.5 0 0.1 1;0.5 0 0.1 1"/></circle>
    <circle cx="1530" cy="40" r="1" opacity="0.05"><animate attributeName="opacity" calcMode="spline" dur="10s" repeatCount="indefinite" keyTimes="0;0.5;1" values="0.05;0.075;0.05" keySplines="0.5 0 0.1 1;0.5 0 0.1 1"/><animateTransform attributeName="transform" type="translate" additive="sum" calcMode="spline" dur="12s" repeatCount="indefinite" keyTimes="0;0.5;1" values="0,0;8,0;0,0" keySplines="0.5 0 0.1 1;0.5 0 0.1 1"/></circle>
    <circle cx="1530" cy="200" r="1" opacity="0.04"><animate attributeName="opacity" calcMode="spline" dur="8s" repeatCount="indefinite" keyTimes="0;0.5;1" values="0.04;0.065;0.04" keySplines="0.5 0 0.1 1;0.5 0 0.1 1"/></circle>
  </g>
  <g transform="translate(800.0 120.0)"><g transform="translate(-800.0 -120.0)">
  <rect x="40" y="20" width="1520" height="200" rx="28" fill="#1F1F22" fill-opacity="0.52" stroke="#F5F5F2" stroke-opacity="0.14" stroke-width="1"/>
  <g clip-path="url(#syclip)">
    <rect x="40" y="20" width="1520" height="12" fill="url(#topGlow)"/>
    <g transform="rotate(20 800.0 120.0)"><rect x="-300" y="-100" width="280" height="440" fill="url(#specBand)"><animateTransform attributeName="transform" type="translate" calcMode="spline" dur="10s" begin="0s" repeatCount="indefinite" keyTimes="0;0.4;1" values="0,0;1920,0;1920,0" keySplines="0.5 0 0.1 1;0.5 0 0.1 1"/></rect></g>
  </g>
  <rect x="68" y="20.5" width="1464" height="1.5" fill="url(#edgeGrad)"/>
  <g clip-path="url(#syclip)">
    <text x="1545" y="200" text-anchor="end" font-size="190" font-weight="600" fill="#F5F5F2" opacity="0.12">0</text>
    <mask id="wm2"><text x="1545" y="200" text-anchor="end" font-size="190" font-weight="600" fill="#fff">0</text></mask>
    <g mask="url(#wm2)"><rect x="900" y="20" width="220" height="200" fill="url(#shimmer)" transform="rotate(16 1300 120)"><animateTransform attributeName="transform" type="translate" calcMode="spline" dur="17s" repeatCount="indefinite" keyTimes="0;0.4;1" values="0,0;700,0;700,0" keySplines="0.5 0 0.1 1;0.5 0 0.1 1"/></rect></g>
  </g>
  <rect x="40" y="20" width="2" height="200" fill="#C9A876" fill-opacity="0.4"/>
  <rect x="40" y="20" width="2" height="64" fill="url(#barLight)"><animateTransform attributeName="transform" type="translate" calcMode="spline" dur="7s" repeatCount="indefinite" keyTimes="0;0.5;1" values="0,0;0,136;0,0" keySplines="0.5 0 0.1 1;0.5 0 0.1 1"/></rect>
  <text x="90" y="88" font-size="30" font-weight="500" fill="#F5F5F2">ON-PREM SRE ENGINE</text>
  <text x="90" y="128" font-size="17" font-weight="400" fill="#C7C5C0">A 14B-parameter model that diagnoses servers and writes its own remediation. Nothing leaves the machine.</text>
  <text x="90" y="170" font-family="'SF Mono', ui-monospace, Menlo, monospace" font-size="11" letter-spacing="1.5" fill="#888780">0 BYTES OUTBOUND · &lt;800MS · 4-BIT MLX</text>
  </g><animateTransform attributeName="transform" type="scale" additive="sum" calcMode="spline" dur="9s" begin="3.0s" repeatCount="indefinite" keyTimes="0;0.5;1" values="1;1.004;1" keySplines="0.5 0 0.1 1;0.5 0 0.1 1"/></g>
</svg>
