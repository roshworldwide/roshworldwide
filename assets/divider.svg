<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 14" width="1200" height="14">
  <defs>
    <linearGradient id="lineGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="0.25" stop-color="#ff4757"/>
      <stop offset="0.5" stop-color="#58a6ff"/>
      <stop offset="0.75" stop-color="#ff4757"/>
      <stop offset="1" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="pulseGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- base line -->
  <rect x="0" y="6" width="1200" height="2" fill="url(#lineGrad)"/>

  <!-- travelling pulse -->
  <rect y="6" width="200" height="2" fill="url(#pulseGrad)">
    <animate attributeName="x" values="-200;1200" dur="4s" repeatCount="indefinite"/>
  </rect>

  <!-- center dot -->
  <circle cx="600" cy="7" r="3.5" fill="#ff4757">
    <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>
