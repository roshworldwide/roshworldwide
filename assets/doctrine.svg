    <clipPath id="dc0"><rect x="0" y="0" width="1600" height="300"><animate attributeName="width" calcMode="spline" dur="2.4s" fill="freeze" keyTimes="0;0.000;0.300;1" values="0;0;1600;1600" keySplines="0.5 0 0.1 1;0.32 0.72 0 1;0.5 0 0.1 1"/></rect></clipPath>
