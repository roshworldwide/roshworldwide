  <g clip-path="url(#dc3)"><text x="800" y="258" text-anchor="middle" font-size="26" font-weight="400" fill="#F5F5F2">Stillness before movement<tspan fill="#F5F5F2">.<animate attributeName="fill" to="#C9A876" begin="3.4s" dur="0.6s" fill="freeze"/></tspan></text></g>
