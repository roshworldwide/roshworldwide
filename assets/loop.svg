  <text x="800" y="82" text-anchor="middle" font-size="24" font-weight="400" fill="#C7C5C0">Find the problem.<tspan fill="#C9A876" fill-opacity="0.4">&#160;&#160;&#8594;&#160;&#160;</tspan>Invent the fix.<tspan fill="#C9A876" fill-opacity="0.4">&#160;&#160;&#8594;&#160;&#160;</tspan>Ship to production.<tspan fill="#C9A876" fill-opacity="0.4">&#160;&#160;&#8594;&#160;&#160;</tspan>File the patent.<tspan fill="#C9A876" fill-opacity="0.4">&#160;&#160;&#8594;&#160;&#160;</tspan><tspan font-weight="500" fill="#F5F5F2">Repeat.</tspan></text>
  <mask id="loopm"><text x="800" y="82" text-anchor="middle" font-size="24" font-weight="400" fill="#fff">Find the problem.<tspan fill="#C9A876" fill-opacity="0.4">&#160;&#160;&#8594;&#160;&#160;</tspan>Invent the fix.<tspan fill="#C9A876" fill-opacity="0.4">&#160;&#160;&#8594;&#160;&#160;</tspan>Ship to production.<tspan fill="#C9A876" fill-opacity="0.4">&#160;&#160;&#8594;&#160;&#160;</tspan>File the patent.<tspan fill="#C9A876" fill-opacity="0.4">&#160;&#160;&#8594;&#160;&#160;</tspan><tspan font-weight="500" fill="#F5F5F2">Repeat.</tspan></text></mask>
