<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 160" width="1200" height="160" font-family="ui-monospace, 'JetBrains Mono', 'SF Mono', Menlo, Consolas, monospace">
  <defs>
    <linearGradient id="footBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#160a0e"/>
    </linearGradient>
    <linearGradient id="quoteGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#58a6ff"/>
      <stop offset="0.5" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#ff4757"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect x="0" y="0" width="1200" height="160" fill="url(#footBg)"/>

  <!-- ECG / heartbeat, self-drawing -->
  <path d="M80 55 H540 l8 -8 l10 16 l16 -48 l16 72 l16 -32 l8 0 H1120"
        fill="none" stroke="#ff4757" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"
        pathLength="1000" stroke-dasharray="1000">
    <animate attributeName="stroke-dashoffset" values="1000;0" dur="3.5s" repeatCount="indefinite"/>
  </path>
  <circle cx="574" cy="15" r="3" fill="#ff4757">
    <animate attributeName="r" values="3;6;3" dur="1.4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0.4;1" dur="1.4s" repeatCount="indefinite"/>
  </circle>

  <!-- quote -->
  <text x="600" y="118" font-size="20" font-weight="700" text-anchor="middle" fill="url(#quoteGrad)">"Most engineers list skills. I list deployments."</text>

  <!-- bottom line -->
  <text x="600" y="146" font-size="14" letter-spacing="2" text-anchor="middle" fill="#7d8590">OPEN TO HARD PROBLEMS · NOT JOB TITLES</text>
</svg>
